<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laptop Mỹ</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<style>
body{font-family:Arial;margin:0;background:#eef2f7}
header{background:#0a74da;color:white;padding:15px;text-align:center}
.container{padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
.card img{width:100%;height:160px;object-fit:cover}
.btn{background:#0a74da;color:white;border:none;padding:10px;width:100%;cursor:pointer;margin-top:10px}
.cart{position:fixed;right:0;top:0;width:300px;height:100%;background:white;padding:15px;box-shadow:-2px 0 10px rgba(0,0,0,0.2);overflow:auto}
input{width:100%;padding:8px;margin:5px 0}
.login{max-width:300px;margin:20px auto;background:white;padding:20px;border-radius:10px}
.chat{position:fixed;bottom:20px;left:20px}
.chat a{display:block;margin:5px 0;padding:10px;background:#25d366;color:white;text-decoration:none;border-radius:5px;text-align:center}
.messenger{background:#0084ff !important}
.hidden{display:none}
</style>
</head>
<body>

<header>
<h1>Laptop Mỹ 🚀</h1>
</header>

<!-- LOGIN -->
<div class="login" id="loginBox">
<h3>🔐 Admin Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Đăng nhập</button>
</div>

<div class="container hidden" id="main">

<h3>➕ Admin thêm sản phẩm</h3>
<input id="name" placeholder="Tên laptop">
<input id="price" placeholder="Giá">
<input id="img" placeholder="Link ảnh">
<button class="btn" onclick="addProduct()">Thêm sản phẩm</button>

<h2>Sản phẩm</h2>
<div class="products" id="products"></div>

</div>

<div class="cart">
<h3>🛒 Giỏ hàng</h3>
<ul id="cartList"></ul>
<p><b>Tổng: <span id="total">0</span> VNĐ</b></p>
<input id="phone" placeholder="Số điện thoại">
<button class="btn" onclick="checkout()">Đặt hàng</button>
</div>

<!-- CHAT -->
<div class="chat">
<a href="https://zalo.me/0988531820" target="_blank">💬 Chat Zalo</a>
<a href="https://m.me/YOUR_PAGE" target="_blank" class="messenger">💬 Messenger</a>
</div>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA4Jjs4OY8WjyLzvdc-PaUzXD94An7VtrY",
  authDomain: "laptop-shop-aac90.firebaseapp.com",
  projectId: "laptop-shop-aac90",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let cart=[];

// LOGIN
function login(){
const email=document.getElementById("email").value;
const pass=document.getElementById("password").value;
auth.signInWithEmailAndPassword(email,pass)
.then(()=>{
alert("Đăng nhập thành công");
})
.catch(()=>alert("Sai tài khoản"));
}

auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("main").classList.remove("hidden");
}
});

// PRODUCT
function addProduct(){
const name=document.getElementById("name").value;
const price=Number(document.getElementById("price").value);
const img=document.getElementById("img").value;
if(!name||!price||!img){alert("Nhập đủ!");return;}
db.collection("products").add({name,price,img});
}

function loadProducts(){
db.collection("products").onSnapshot(snapshot=>{
const el=document.getElementById("products");
el.innerHTML="";
snapshot.forEach(doc=>{
const p=doc.data();
let div=document.createElement("div");
div.className="card";
div.innerHTML=`
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price.toLocaleString()} VNĐ</p>
<button class="btn" onclick="addToCart('${doc.id}','${p.name}',${p.price})">Mua</button>
<button class="btn" onclick="deleteProduct('${doc.id}')">Xóa</button>
`;
el.appendChild(div);
});
});
}

function deleteProduct(id){
db.collection("products").doc(id).delete();
}

// CART
function addToCart(id,name,price){
cart.push({id,name,price});
renderCart();
}

function renderCart(){
const list=document.getElementById("cartList");
list.innerHTML="";
let total=0;
cart.forEach(item=>{
let li=document.createElement("li");
li.textContent=item.name+" - "+item.price.toLocaleString()+" VNĐ";
list.appendChild(li);
total+=item.price;
});
document.getElementById("total").textContent=total.toLocaleString();
}

function checkout(){
const phone=document.getElementById("phone").value;
if(cart.length===0||!phone){alert("Nhập đủ!");return;}
db.collection("orders").add({cart,phone,date:new Date()});
alert("Đặt hàng thành công!");
cart=[];
renderCart();
}

loadProducts();
</script>

</body>
</html>
